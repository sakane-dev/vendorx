<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title">Island.io 経営層向けプレゼンテーション</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&family=Noto+Sans+JP:wght@400&family=Roboto:wght@400&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-weight: normal !important;
            box-sizing: border-box;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        :root {
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;

            --primary: #60a5fa;
            --secondary: #34d399;
            --alert: #f87171;

            --font-en: 'Montserrat', 'Roboto', sans-serif;
            --font-ja: 'Noto Sans JP', sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #05080f;
            color: var(--text-main);
            font-family: var(--font-ja);
        }

        .en-text,
        .number-alert,
        .number-secondary,
        .number-primary,
        .slide-title,
        .scqa-label,
        .slide-footer {
            font-family: var(--font-en);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(10, 15, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .lang-switch button {
            background: transparent;
            border: 1px solid var(--text-sub);
            color: var(--text-sub);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .lang-switch button.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        .lang-dropdown {
            position: relative;
            display: inline-block;
        }

        .lang-dropbtn {
            background: transparent;
            border: 1px solid var(--text-sub);
            color: var(--text-sub);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: var(--font-en);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .lang-dropbtn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .lang-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #0f172a;
            min-width: 140px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.5);
            z-index: 1;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 0;
            overflow: hidden;
        }

        .lang-dropdown-content a {
            color: var(--text-sub);
            padding: 0.7rem 1.2rem;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            font-family: var(--font-en);
            transition: background-color 0.2s;
        }

        .lang-dropdown-content a:hover {
            background-color: rgba(96, 165, 250, 0.2);
            color: var(--text-main);
        }
        
        .lang-dropdown-content a.active {
            color: var(--primary);
            background-color: rgba(96, 165, 250, 0.1);
        }

        .lang-dropdown:hover .lang-dropdown-content {
            display: block;
        }

        #slider-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .slide {
            min-width: 100vw;
            height: 100vh;
            padding: 6rem 8vw;
            display: flex;
            align-items: center;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 15, 30, 0.3);
            backdrop-filter: grayscale(20%) brightness(0.7) blur(2px);
            -webkit-backdrop-filter: grayscale(20%) brightness(0.7) blur(2px);
            z-index: 0;
        }

        .slide-inner {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            z-index: 1;
            position: relative;
            text-align: left;
        }

        .slide-footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            line-height: 1.6;
            letter-spacing: 0.05em;
            z-index: 10;
        }

        .layout-center .slide-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        .layout-left .slide-inner {
            max-width: 800px;
            margin-right: auto;
        }

        .layout-right .slide-inner {
            max-width: 800px;
            margin-left: auto;
        }

        .layout-three-column .slide-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .scqa-label {
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: inline-block;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
            padding-bottom: 0.3rem;
        }

        .slide-title {
            font-size: 2.8rem;
            line-height: 1.35;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            letter-spacing: -0.02em;
            text-wrap: balance;
        }

        .slide-subtitle {
            font-size: 1.4rem;
            color: var(--text-sub);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            border-left: 4px solid var(--primary);
            padding-left: 1.5rem;
            text-wrap: balance;
        }

        .slide-content {
            font-size: 1.25rem;
            line-height: 1.9;
            color: var(--text-sub);
        }

        .number-alert {
            color: var(--alert);
            font-size: 1.35em;
            letter-spacing: -0.02em;
        }

        .number-secondary {
            color: var(--secondary);
            font-size: 1.35em;
            letter-spacing: -0.02em;
        }

        .number-primary {
            color: var(--primary);
            font-size: 1.35em;
            letter-spacing: -0.02em;
        }

        .safe-zone {
            background: rgba(52, 211, 153, 0.1);
            border-left: 4px solid var(--secondary);
            padding: 0.8rem 1.2rem;
            color: var(--text-main);
            display: inline-block;
            margin-top: 0.5rem;
            border-radius: 0 8px 8px 0;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            border-color: rgba(96, 165, 250, 0.4);
        }

        .item-card-title {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            font-family: var(--font-en);
        }

        .item-card-desc {
            font-size: 1.1rem;
            color: var(--text-sub);
            line-height: 1.7;
        }

        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            z-index: 50;
            transition: all 0.2s;
        }

        .nav-arrow:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        #prev-btn {
            left: 2rem;
        }

        #next-btn {
            right: 2rem;
        }

        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--primary);
            width: 0%;
            transition: width 0.8s linear;
            z-index: 60;
        }

        .chatbot-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 380px;
            height: 550px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            transform: translateY(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .chatbot-container.active {
            transform: translateY(0);
        }

        .chatbot-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s;
        }

        .chatbot-toggle:hover {
            transform: scale(1.05);
        }
    </style>
</head>

        const sliderContainer = document.getElementById('slider-container');

        slideData.forEach(slide => {
            const div = document.createElement('div');
            div.className = `slide`;
            div.style.backgroundImage = `url('${slide.img}${imgParams}')`;

            let innerHTML = `<div class="slide-inner layout-${slide.layout}">`;
            innerHTML += `<div class="scqa-label">${slide.phase.replace('_', ' & ')}</div>`;

            if (slide.layout === 'center' || slide.layout === 'left' || slide.layout === 'right') {
                innerHTML += `
                    <h2 class="slide-title" data-i18n="${slide.title_key}"></h2>
                    <div class="slide-content" data-i18n="${slide.content_key}"></div>`;
            } else if (slide.layout === 'three-column') {
                innerHTML += `
                    <h2 class="slide-title" data-i18n="${slide.title_key}"></h2>
                    <div class="slide-subtitle" data-i18n="${slide.sub_key}"></div>
                    <div class="items-grid">`;
                slide.items.forEach(item => {
                    innerHTML += `
                        <div class="item-card">
                            <div class="item-card-title" data-i18n="${item.t_key}"></div>
                            <div class="item-card-desc" data-i18n="${item.d_key}"></div>
                        </div>`;
                });
                innerHTML += `</div>`;
            }
            innerHTML += `</div>`;

            // 各スライドの最下部にフッターを追加
            innerHTML += `<div class="slide-footer">© 2026 Yasuyuki Sakane (yasuyuki@sakane.dev). All rights reserved.<br>Privacy Policy | Confidential</div>`;

            div.innerHTML = innerHTML;
            sliderContainer.appendChild(div);
        });

        let currentSlide = 0;
        const totalSlides = slideData.length;
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progressBar');

        function updateSlider() {
            sliderContainer.style.transform = `translateX(-${currentSlide * 100}vw)`;
            prevBtn.style.opacity = currentSlide === 0 ? '0.3' : '1';
            nextBtn.style.opacity = currentSlide === totalSlides - 1 ? '0.3' : '1';
            progressBar.style.width = `${((currentSlide + 1) / totalSlides) * 100}%`;
        }

        let autoScrollTimer;
        const AUTO_SCROLL_INTERVAL = 11000;

        function startAutoScroll() {
            stopAutoScroll();
            autoScrollTimer = setInterval(() => {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                } else {
                    currentSlide = 0;
                }
                updateSlider();
            }, AUTO_SCROLL_INTERVAL);
        }

        function stopAutoScroll() {
            clearInterval(autoScrollTimer);
        }

        document.body.addEventListener('mouseenter', stopAutoScroll);
        document.body.addEventListener('mouseleave', startAutoScroll);

        let isWheeling = false;
        window.addEventListener('wheel', (e) => {
            if (isWheeling) return;
            isWheeling = true;
            stopAutoScroll();

            if (e.deltaY > 0 && currentSlide < totalSlides - 1) {
                currentSlide++;
            } else if (e.deltaY < 0 && currentSlide > 0) {
                currentSlide--;
            }
            updateSlider();
            setTimeout(() => { isWheeling = false; }, 800);
        });

        nextBtn.addEventListener('click', () => { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlider(); stopAutoScroll(); } });
        prevBtn.addEventListener('click', () => { if (currentSlide > 0) { currentSlide--; updateSlider(); stopAutoScroll(); } });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentSlide < totalSlides - 1) { currentSlide++; updateSlider(); stopAutoScroll(); }
            if (e.key === 'ArrowLeft' && currentSlide > 0) { currentSlide--; updateSlider(); stopAutoScroll(); }
        });

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (i18nData[lang] && i18nData[lang][key]) {
                    if (element.tagName === 'TITLE') {
                        document.title = i18nData[lang][key];
                    } else {
                        element.innerHTML = i18nData[lang][key];
                    }
                }
            });
            
            // ドロップダウンメニューの更新
            const selectedLangText = document.getElementById('selected-lang-text');
            const langButtons = document.querySelectorAll('.lang-btn');
            
            langButtons.forEach(btn => {
                const btnLang = btn.dataset.lang;
                const isActive = btnLang === lang;
                btn.classList.toggle('active', isActive);
                if (isActive) {
                    selectedLangText.textContent = btn.textContent;
                }
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                setLanguage(e.target.dataset.lang);
            });
        });

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatHistory = document.getElementById('chatHistory');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const chatToggle = document.getElementById('chatToggle');
        const chatContainer = document.getElementById('chatContainer');
        const chatClose = document.getElementById('chatClose');

        chatToggle.addEventListener('click', () => chatContainer.classList.add('active'));
        chatClose.addEventListener('click', () => chatContainer.classList.remove('active'));

        const systemContext = JSON.stringify(i18nData.ja);

        async function sendMessageToGemini() {
            const message = chatInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!message) return;
            if (!apiKey) {
                appendMessage('System', 'APIキーを入力してください。', 'system');
                return;
            }

            appendMessage('You', message, 'user');
            chatInput.value = '';

            const requestBody = {
                contents: [{
                    role: "user",
                    parts: [{ text: "以下のスライドデータに基づいて回答してください。\n" + systemContext + "\n\n質問：" + message }]
                }],
                generationConfig: { temperature: 0.2 }
            };

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();

                if (data.candidates && data.candidates.length > 0) {
                    appendMessage('Assistant', data.candidates[0].content.parts[0].text, 'bot');
                }
            } catch (error) {
                appendMessage('System', '通信エラーが発生しました。', 'system');
            }
        }

        function appendMessage(sender, text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.style.padding = '1rem';
            msgDiv.style.borderRadius = '8px';
            msgDiv.style.maxWidth = '85%';
            msgDiv.style.background = type === 'user' ? 'rgba(96, 165, 250, 0.2)' : 'rgba(255, 255, 255, 0.05)';
            msgDiv.style.border = type === 'user' ? '1px solid rgba(96, 165, 250, 0.3)' : '1px solid rgba(255, 255, 255, 0.1)';
            msgDiv.style.alignSelf = type === 'user' ? 'flex-end' : 'flex-start';
            msgDiv.textContent = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessageToGemini);
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessageToGemini(); });

        updateSlider();
        setLanguage('ja');
        startAutoScroll();
    </script>
